version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
      - ./log:/app/log
    environment:
      - APP_SERVER_PORT=8000
      - APP_SERVER_BASE_URL=http://app:8000
      - APP_LOGGER_ENABLE_LOGFILE=false
      - APP_DB_HOST=db
      - APP_DB_PORT=3306
      - APP_DB_USER=root
      - APP_DB_PASSWORD=password
      - APP_DB_NAME=loan
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=loan
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
